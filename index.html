<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Оцінки спортсменів — Художня гімнастика</title>
<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #e3cfff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

header {
  color: #fff;
  font-size: 2em;
  font-weight: 600;
  margin-bottom: 40px;
  text-shadow: 0 0 15px #c299ff;
  animation: fadeIn 1.5s ease-in-out;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(200, 150, 255, 0.4);
  border-radius: 15px;
  padding: 30px 50px;
  box-shadow: 0 0 30px rgba(160, 80, 255, 0.3);
  backdrop-filter: blur(10px);
  min-width: 60%;
  transition: opacity 0.4s ease-in-out;
  position: relative;
}

.cell {
  font-size: 1.6em;
  color: #bb8fff;
  margin: 10px 0;
  font-weight: 600;
  opacity: 0;
  animation: fadeUp 0.8s ease-in-out forwards;
}

.decor {
  font-size: 2.2em;
  color: #ffd700;
  margin-bottom: 15px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 40px;
  color: #bdaaff;
  font-size: 0.9em;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeUp {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ffd700; }
  50% { transform: scale(1.2); text-shadow: 0 0 25px #ffea8a; }
}
</style>
</head>
<body>

<header>Офіційні результати змагань з художньої гімнастики</header>

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div class="cell">Завантаження...</div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
// Ваша адреса веб-додатка
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzbcHHPqHcRlhRl3r2ukqNG6bCbCY8gkiR2c9-q9D0OLcTwee-Zl7yvi1_jo0VKxCI-LQ/exec";

let lastDataStr = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");

  try {
    // ДОДАЄМО ПАРАМЕТР ?t= ДЛЯ ПРИМУСОВОГО ОНОВЛЕННЯ ДАНИХ (АНТИКЕШ)
    const response = await fetch(WEB_APP_URL + "?t=" + new Date().getTime());
    
    if (!response.ok) throw new Error("Помилка мережі");
    
    const row = await response.json();

    // Якщо рядок порожній або не прийшов
    if (!row || row.length === 0) return;

    // Перетворюємо дані у рядок для порівняння (щоб не оновлювати екран дарма)
    const currentDataStr = JSON.stringify(row);
    if (currentDataStr === lastDataStr) return;
    lastDataStr = currentDataStr;

    // Створюємо HTML для виводу (7 стовпців)
    let html = `<div class="decor">👑</div>`;
    
    // Виводимо всі колонки, які приходять (обмежуємо 7-ма для дизайну)
    row.slice(0, 7).forEach(text => {
      const val = (text !== "" && text !== null) ? text : "—";
      html += `<div class="cell">${val}</div>`;
    });

    // Ефект перемикання даних
    scoreboard.style.opacity = 0;
    setTimeout(() => {
      scoreboard.innerHTML = html;
      scoreboard.style.opacity = 1;
    }, 150);

  } catch (error) {
    console.error("Помилка завантаження:", error);
  }
}

// Запуск відразу
loadData();

// Опитування кожні 3 секунди
setInterval(loadData, 3000);
</script>

</body>
</html>
