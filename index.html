<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Оцінки спортсменів — Художня гімнастика</title>
<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #e3cfff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

header {
  color: #fff;
  font-size: 2em;
  font-weight: 600;
  margin-bottom: 40px;
  text-shadow: 0 0 15px #c299ff;
  animation: fadeIn 1.5s ease-in-out;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(200, 150, 255, 0.4);
  border-radius: 15px;
  padding: 30px 50px;
  box-shadow: 0 0 30px rgba(160, 80, 255, 0.3);
  backdrop-filter: blur(10px);
  min-width: 60%;
  transition: opacity 0.4s ease-in-out;
  position: relative;
}

.cell {
  font-size: 1.6em;
  color: #bb8fff;
  margin: 10px 0;
  font-weight: 600;
  opacity: 0;
  animation: fadeUp 0.8s ease-in-out forwards;
}

.decor {
  font-size: 2.2em;
  color: #ffd700;
  margin-bottom: 15px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 40px;
  color: #bdaaff;
  font-size: 0.9em;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeUp {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ffd700; }
  50% { transform: scale(1.2); text-shadow: 0 0 25px #ffea8a; }
}
</style>
</head>
<body>

<header>Офіційні результати змагань з художньої гімнастики</header>

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div class="cell">Завантаження...</div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRz-4FumJ2c76o-bbGnbWWg_gw9nqxbEYMjdIaJi6Y5uMELcOfmiByk08qBfS8-MPt4vV3pBlJ_TuZT/pub?gid=1614929973&single=true&output=csv";

let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");

  try {
    const res = await fetch(SHEET_URL + "&t=" + Date.now(), {
      cache: "no-store"
    });

    const text = await res.text();

    const rows = parseCSV(text);

    // 👉 беремо 7-й рядок (але стабільно)
    const row = rows[6] || [];

    const fixedRow = Array.from({ length: 7 }, (_, i) => row[i] ?? "—");

    const newData = JSON.stringify(fixedRow);

    if (newData === lastData) return;
    lastData = newData;

    let html = `<div class="decor">👑</div>`;

    fixedRow.forEach(v => {
      html += `<div class="cell">${v}</div>`;
    });

    scoreboard.style.opacity = 0;

    setTimeout(() => {
      scoreboard.innerHTML = html;
      scoreboard.style.opacity = 1;
    }, 120);

  } catch (e) {
    document.getElementById("scoreboard").innerHTML =
      `<div class="decor">👑</div><div class="cell">Помилка завантаження</div>`;
  }
}

/* 🔥 НАДІЙНИЙ CSV ПАРСЕР */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let value = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];

    if (c === '"') {
      inQuotes = !inQuotes;
    } else if (c === "," && !inQuotes) {
      row.push(value);
      value = "";
    } else if ((c === "\n" || c === "\r") && !inQuotes) {
      if (value !== "" || row.length) {
        row.push(value);
        rows.push(row);
        row = [];
        value = "";
      }
    } else {
      value += c;
    }
  }

  if (value || row.length) {
    row.push(value);
    rows.push(row);
  }

  return rows;
}

loadData();
setInterval(loadData, 2000);
</script>

</body>
</html>
