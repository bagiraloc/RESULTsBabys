<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sportart Rhythmic — LIVE</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
  /* Изумрудный градиент */
  background: radial-gradient(circle at center, #0a3d24 0%, #061a0f 100%);
  color: #eb8eb7;
  display: flex;
  flex-direction: column;
  justify-content: flex-start; 
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

header {
  flex-shrink: 0;
  margin-top: 5px; 
  margin-bottom: 2px; 
  animation: fadeIn 1.5s ease-in-out;
}

.header-logo {
  width: 400px; 
  height: auto;
  filter: drop-shadow(0 0 10px #eb8eb7);
}

.logo-estevents {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 100px;
  height: auto;
  z-index: 1000;
  opacity: 0.8;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.03);
  border: 2px solid #eb8eb7; 
  border-radius: 30px;
  padding: 20px 40px; 
  box-shadow: 0 0 30px rgba(235, 142, 183, 0.2);
  backdrop-filter: blur(10px);
  min-width: 80%; 
  max-height: 55vh; 
  display: flex;
  flex-direction: column;
  justify-content: center; 
  transition: filter 0.5s ease-in-out;
  margin-top: 5px; 
  margin-bottom: 10px; 
}

.cell-container {
  display: flex;
  flex-direction: column;
  gap: 8px; 
}

.cell {
  font-size: 3.5em; 
  color: #eb8eb7; /* Розовый цвет */
  font-weight: 900; 
  text-transform: uppercase;
  line-height: 1.1;
  /* Неоновая тень */
  text-shadow: 0 0 10px #eb8eb7, 0 0 20px #ff007f;
  animation: fadeUp 0.6s ease-out forwards;
}

.cell:first-child {
  color: #eb8eb7;
  font-size: 4em;
  margin-bottom: 5px;
}

.decor {
  font-size: 3em;
  color: #eb8eb7;
  margin-bottom: 5px;
  text-shadow: 0 0 10px #eb8eb7;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  color: #eb8eb7;
  font-size: 1em; 
  font-weight: 600;
  opacity: 0.8;
  flex-shrink: 0;
  margin-bottom: 5px;
}

@keyframes fadeUp {
  0% { transform: translateY(15px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@media (max-width: 768px) {
  .header-logo { width: 200px; }
  .cell { font-size: 1.2em; }
  .cell:first-child { font-size: 1.5em; }
  .scoreboard { padding: 10px 20px; min-width: 90%; }
}
</style>
</head>
<body>

<header>
  <img src="Lemberg Cup.png" alt="Lemberg Cup" class="header-logo">
</header>

<img src="logo_estevents.png.png" alt="EstEvents Logo" class="logo-estevents">

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div id="content" class="cell-container">
    <div class="cell">ОЧІКУВАННЯ...</div>
  </div>
</div>

<footer>© 2026 EstEvents by Емма Щелецька</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8bIfxUFNLKBZZ9OQn9r-Dqt7jsaJULJJ-yNHhIT8U7AFGkWf8aiNrbG7cVbxEw6Oc0w/exec";
let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");
  const content = document.getElementById("content");

  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    if (!res.ok) return;

    const data = await res.json();
    if (!Array.isArray(data)) return;

    const fixedRow = data.slice(1, 7).map((v, index) => {
      if (v === undefined || String(v).trim() === "") return "—";
      
      if (index === 5) {
        let num = parseFloat(String(v).replace(',', '.'));
        if (!isNaN(num)) return num.toFixed(3);
      }
      
      return String(v).trim();
    });

    const newData = JSON.stringify(fixedRow);
    if (newData === lastData) return;
    lastData = newData;

    scoreboard.style.filter = "blur(8px)";

    setTimeout(() => {
      content.innerHTML = fixedRow.map((v, i) => 
        `<div class="cell" style="animation-delay: ${i * 0.05}s">${v}</div>`
      ).join('');
      scoreboard.style.filter = "blur(0)";
    }, 300);

  } catch (e) { console.error("Error", e); }
}

loadData();
setInterval(loadData, 2500);
</script>

</body>
</html>
