<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Оцінки спортсменів — Художня гімнастика</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #e3cfff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

header {
  color: #fff;
  font-size: 2em;
  font-weight: 600;
  margin-bottom: 40px;
  text-shadow: 0 0 15px #c299ff;
  animation: fadeIn 1.5s ease-in-out;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(200, 150, 255, 0.4);
  border-radius: 15px;
  padding: 30px 50px;
  box-shadow: 0 0 30px rgba(160, 80, 255, 0.3);
  backdrop-filter: blur(10px);
  min-width: 60%;
  transition: opacity 0.4s ease-in-out;
  position: relative;
}

.spinner {
  width: 120px;
  height: 120px;
  margin: 30px auto;
  background-image: url('https://i.imgur.com/XavZj7E.png');
  background-size: contain;
  background-repeat: no-repeat;
  animation: spinGymnast 2s linear infinite;
}

@keyframes spinGymnast {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.cell {
  font-size: 1.6em;
  color: #bb8fff;
  margin: 10px 0;
  font-weight: 600;
  opacity: 0;
  animation: fadeUp 0.8s ease-in-out forwards;
}

.decor {
  font-size: 2.2em;
  color: #ffd700;
  margin-bottom: 15px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 40px;
  color: #bdaaff;
  font-size: 0.9em;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeUp {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ffd700; }
  50% { transform: scale(1.2); text-shadow: 0 0 25px #ffea8a; }
}

.scoreChanged { animation: pulse 1s ease-in-out; }

@keyframes pulse {
  0% { transform: scale(1); color: #bb8fff; }
  50% { transform: scale(1.3); color: #ff6fff; }
  100% { transform: scale(1); color: #bb8fff; }
}
</style>
</head>

<body>

<header>Sport Art Cup - 2026</header>

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div class="cell">Завантаження...</div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRz-4FumJ2c76o-bbGnbWWg_gw9nqxbEYMjdIaJi6Y5uMELcOfmiByk08qBfS8-MPt4vV3pBlJ_TuZT/pub?gid=1614929973&single=true&output=csv&t=" + Date.now();

let oldRow = [];

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");

  scoreboard.style.opacity = 0;
  scoreboard.innerHTML = `
    <div class="decor">👑</div>
    <div class="spinner"></div>
    <div class="cell" style="color:#ffbfff;">Оновлення даних...</div>
  `;

  try {
    const res = await fetch(SHEET_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);

    const text = await res.text();

    // CSV -> рядки
    const rows = text.trim().split("\n").map(r => r.split(","));

    // 👉 7-й рядок (DISPLAY лист = вже у CSV)
    let row = rows[6] || [];

    // 7 колонок
    row = Array.from({ length: 7 }, (_, i) => row[i] || "—");

    await new Promise(r => setTimeout(r, 1000));

    let html = `<div class="decor">👑</div>`;

    row.forEach((cell, index) => {
      const changed = oldRow[index] !== undefined && oldRow[index] !== cell;
      html += `<div class="cell${changed ? ' scoreChanged' : ''}">${cell}</div>`;
    });

    scoreboard.style.opacity = 0;

    setTimeout(() => {
      scoreboard.innerHTML = html;
      scoreboard.style.opacity = 1;
    }, 250);

    oldRow = row;

  } catch (err) {
    scoreboard.innerHTML = `
      <div class="decor">👑</div>
      <div class="cell">Помилка завантаження 😢<br>${err.message}</div>
    `;
  }
}

loadData();
setInterval(loadData, 15000);
</script>

</body>
</html>
