<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRz-4FumJ2c76o-bbGnbWWg_gw9nqxbEYMjdIaJi6Y5uMELcOfmiByk08qBfS8-MPt4vV3pBlJ_TuZT/pub?gid=1614929973&single=true&output=csv";

let oldRow = [];

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");

  scoreboard.style.opacity = 0;
  scoreboard.innerHTML = `
    <div class="decor">👑</div>
    <div class="spinner"></div>
    <div class="cell" style="color:#ffbfff;">Оновлення даних...</div>
  `;

  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);

    const text = await res.text();

    // CSV → рядки
    const rows = text.trim().split("\n").map(r => r.split(","));

    // 👉 7-й рядок (індекс 6)
    let row = rows[6] || [];

    // нормалізуємо до 7 колонок
    row = Array.from({ length: 7 }, (_, i) => row[i] || "—");

    const filledCount = row.filter(v => v && v.trim() !== "—").length;
    if (filledCount < 3 && oldRow.length) return;

    await new Promise(r => setTimeout(r, 1000));

    let html = `<div class="decor">👑</div>`;

    row.forEach((cell, index) => {
      const changed = oldRow[index] !== undefined && oldRow[index] !== cell;
      html += `<div class="cell${changed ? ' scoreChanged' : ''}">${cell}</div>`;
    });

    scoreboard.style.opacity = 0;

    setTimeout(() => {
      scoreboard.innerHTML = html;
      scoreboard.style.opacity = 1;
    }, 250);

    oldRow = row;

  } catch (err) {
    showLoading("Не вдалося завантажити дані 😢<br>" + err.message);
  }
}

function showLoading(message) {
  const scoreboard = document.getElementById("scoreboard");
  scoreboard.innerHTML = `
    <div class="decor">👑</div>
    <div class="spinner"></div>
    <div class="cell" style="color:#ffbfff;">${message}</div>
  `;
}

showLoading("Завантаження...");
loadData();
setInterval(loadData, 15000);
</script>
