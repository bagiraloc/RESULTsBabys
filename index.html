<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sportart Rhythmic — LIVE</title>
<style>
/* ОСНОВНІ НАЛАШТУВАННЯ */
body {
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #ffffff;
  display: flex;
  flex-direction: column;
  /* ПРИТИСКАЄМО ВСЕ ДО ВЕРХУ, ЩОБ ПРИБРАТИ ВІДСТАНЬ */
  justify-content: flex-start; 
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

/* ЦЕНТРАЛЬНИЙ ЛОГОТИП (ЗВЕРХУ) */
header {
  flex-shrink: 0;
  margin-top: 5px; /* Мінімальний відступ від верхнього краю екрана */
  margin-bottom: 2px; /* Мінімальний відступ до рамки (близько 1мм) */
  animation: fadeIn 1.5s ease-in-out;
}

.header-logo {
  width: 500px; /* Збільшено логотип для масштабу */
  height: auto;
  filter: drop-shadow(0 0 20px rgba(194, 153, 255, 0.4));
}

/* ЛОГОТИП PARTNER (ВНИЗУ ПРАВОРУЧ) */
.logo-estevents {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 130px;
  height: auto;
  z-index: 1000;
  opacity: 0.8;
}

/* ТАБЛИЦЯ (РАМКА) - МАГІЯ ТУТ */
.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 4px solid rgba(200, 150, 255, 0.5); /* Товстіша рамка */
  border-radius: 30px;
  padding: 20px 60px; /* Оптимізовані відступи */
  box-shadow: 0 0 50px rgba(160, 80, 255, 0.2);
  backdrop-filter: blur(15px);
  min-width: 80%; /* Ширша таблиця для масштабу */
  
  /* ЦЕ ПОВЕРТАЄ НИЖНІЙ КРАЙ РАМКИ */
  max-height: 80vh; /* Рамка не може бути вищою за 80% екрана */
  display: flex;
  flex-direction: column;
  justify-content: center; /* Центруємо текст всередині рамки */
  transition: filter 0.5s ease-in-out;
}

/* КОНТЕЙНЕР ДЛЯ ТЕКСТУ */
.cell-container {
  display: flex;
  flex-direction: column;
  gap: 8px; /* Менша відстань між рядками */
}

/* ТЕКСТ - ПЛАКАТНИЙ ТА ЖИРНИЙ */
.cell {
  font-size: 3.8em; /* Оптимальний розмір, щоб вміститися */
  color: #ffffff;
  /* Текст став максимально жирним */
  font-weight: 900; 
  line-height: 1.1;
  text-shadow: 3px 3px 15px rgba(0, 0, 0, 0.5);
  animation: fadeUp 0.6s ease-out forwards;
}

/* Акцент на перший рядок (прізвище) */
.cell:first-child {
  color: #ffd700;
  font-size: 4.5em;
}

/* Декор (Корона/Зірка) */
.decor {
  font-size: 3.5em;
  color: #ffd700;
  margin-bottom: 5px;
  animation: pulseStar 2s infinite ease-in-out;
}

/* ФУТЕР - ТЕПЕР ФІКСОВАНИЙ ВНИЗУ */
footer {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #bdaaff;
  font-size: 1.2em; /* Футер теж став більшим */
  font-weight: 600;
  opacity: 0.7;
}

/* АНІМАЦІЇ */
@keyframes fadeUp {
  0% { transform: translateY(15px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Мобільна адаптація */
@media (max-width: 768px) {
  .header-logo { width: 200px; }
  .cell { font-size: 1.3em; }
  .cell:first-child { font-size: 1.5em; }
  .scoreboard { padding: 15px 25px; min-width: 90%; }
  .decor { font-size: 1.6em; }
}
</style>
</head>
<body>

<header>
  <img src="logo_sportart.png.jpg" alt="Sport Art Cup" class="header-logo">
</header>

<img src="logo_estevents.png.png" alt="EstEvents Logo" class="logo-estevents">

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div id="content" class="cell-container">
    <div class="cell">ЗАВАНТАЖЕННЯ...</div>
  </div>
</div>

<footer>© 2026 EstEvents by Емма Щелецька</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8bIfxUFNLKBZZ9OQn9r-Dqt7jsaJULJJ-yNHhIT8U7AFGkWf8aiNrbG7cVbxEw6Oc0w/exec";
let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");
  const content = document.getElementById("content");

  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    if (!res.ok) return;

    const data = await res.json();
    if (!Array.isArray(data)) return;

    const fixedRow = Array.from({ length: 7 }, (_, i) => {
      return data[i] !== undefined && String(data[i]).trim() !== "" ? String(data[i]).trim() : "—";
    });

    const newData = JSON.stringify(fixedRow);
    if (newData === lastData) return;
    lastData = newData;

    scoreboard.style.filter = "blur(10px)";

    setTimeout(() => {
      content.innerHTML = fixedRow.map((v, i) => 
        `<div class="cell" style="animation-delay: ${i * 0.05}s">${v}</div>`
      ).join('');
      scoreboard.style.filter = "blur(0)";
    }, 300);

  } catch (e) { console.error("Error", e); }
}

loadData();
setInterval(loadData, 2500);
</script>

</body>
</html>
