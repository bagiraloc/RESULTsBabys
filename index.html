<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Оцінки спортсменів — Художня гімнастика</title>
<style>
/* CSS СТИЛІ ДЛЯ ЛОГОТИПІВ */

/* Фіолетовий логотип (верхній лівий кут) */
.logo-top-left {
  position: fixed; /* Фіксуємо на екрані */
  top: 20px;       /* Відступ зверху */
  left: 20px;      /* Відступ зліва */
  width: 150px;    /* Трохи більший розмір */
  height: auto;
  z-index: 1000;   /* Щоб був поверх усього */
  /* Легке свічення для кращого вигляду на темному тлі */
  filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
  animation: fadeIn 2s ease-in-out;
}

/* Синьо-білий логотип (нижній правий кут) */
.logo-bottom-right {
  position: fixed; /* Фіксуємо на екрані */
  bottom: 15px;    /* Відступ знизу */
  right: 15px;     /* Відступ справа */
  width: 120px;    /* Розмір */
  height: auto;
  z-index: 1000;   /* Щоб був поверх усього */
  opacity: 0.9;    /* Трохи прозоріший */
  animation: fadeIn 2s ease-in-out;
}

/* СТИЛІ САЙТУ (БЕЗ ЗМІН) */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #e3cfff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

header {
  color: #fff;
  font-size: 2.2em;
  font-weight: 600;
  margin-bottom: 40px;
  text-shadow: 0 0 15px #c299ff;
  animation: fadeIn 1.5s ease-in-out;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(200, 150, 255, 0.4);
  border-radius: 20px;
  padding: 40px 60px;
  box-shadow: 0 0 40px rgba(160, 80, 255, 0.2);
  backdrop-filter: blur(15px);
  min-width: 65%;
  position: relative;
  transition: filter 0.5s ease-in-out, transform 0.5s ease-in-out;
}

.updating {
  filter: blur(8px);
  transform: scale(0.98);
}

.cell-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.cell {
  font-size: 1.8em;
  color: #bb8fff;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(187, 143, 255, 0.3);
  animation: fadeUp 0.6s ease-out forwards;
}

.decor {
  font-size: 2.5em;
  color: #ffd700;
  margin-bottom: 20px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 50px;
  color: #bdaaff;
  font-size: 1em;
  opacity: 0.8;
}

@keyframes fadeUp {
  0% { transform: translateY(10px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); text-shadow: 0 0 15px #ffd700; }
  50% { transform: scale(1.15); text-shadow: 0 0 30px #ffea8a; }
}
</style>
</head>
<body>

<img src="https://i.imgur.com/83p731b.png" alt="SPORTART Logo" class="logo-top-left">

<img src="https://i.imgur.com/XavZj7E.png" alt="EstEvents Logo" class="logo-bottom-right">

<header>Sport Art Cup - 2026</header>

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div id="content" class="cell-container">
    <div class="cell">Завантаження...</div>
  </div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8bIfxUFNLKBZZ9OQn9r-Dqt7jsaJULJJ-yNHhIT8U7AFGkWf8aiNrbG7cVbxEw6Oc0w/exec";

let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");
  const content = document.getElementById("content");

  try {
    const res = await fetch(API_URL + "?t=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    if (!res.ok) return;

    const data = await res.json();
    if (!Array.isArray(data)) return;

    const fixedRow = Array.from({ length: 7 }, (_, i) => {
      let value = data[i];
      return value !== undefined && value !== null && String(value).trim() !== ""
        ? String(value).trim()
        : "—";
    });

    const newData = JSON.stringify(fixedRow);
    if (newData === lastData) return;
    lastData = newData;

    scoreboard.classList.add("updating");

    setTimeout(() => {
      let html = "";
      fixedRow.forEach((v, index) => {
        html += `<div class="cell" style="animation-delay: ${index * 0.05}s">${v}</div>`;
      });
      content.innerHTML = html;
      scoreboard.classList.remove("updating");
    }, 300);

  } catch (e) {
    console.error("Помилка:", e);
  }
}

loadData();
setInterval(loadData, 2500);
</script>

</body>
</html>
