<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sportart Rhythmic — Результати</title>
<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #e3cfff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

/* ЦЕНТРАЛЬНИЙ ЛОГОТИП ВЕРХУ */
header {
  margin-bottom: 20px;
  animation: fadeIn 1.5s ease-in-out;
}

.header-logo {
  width: 450px; /* Збільшений розмір для центру */
  height: auto;
  filter: drop-shadow(0 0 15px rgba(194, 153, 255, 0.4));
}

/* ЛОГОТИП ESTEVENTS (ВНИЗУ) */
.logo-estevents {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 110px;
  height: auto;
  z-index: 1000;
  opacity: 0.9;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(200, 150, 255, 0.4);
  border-radius: 20px;
  padding: 30px 60px;
  box-shadow: 0 0 40px rgba(160, 80, 255, 0.2);
  backdrop-filter: blur(15px);
  min-width: 60%;
  transition: filter 0.5s ease-in-out, transform 0.5s ease-in-out;
}

.updating {
  filter: blur(8px);
  transform: scale(0.98);
}

.cell-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.cell {
  font-size: 2em;
  color: #bb8fff;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(187, 143, 255, 0.3);
  animation: fadeUp 0.6s ease-out forwards;
}

.decor {
  font-size: 2.5em;
  color: #ffd700;
  margin-bottom: 10px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 30px;
  color: #bdaaff;
  font-size: 0.9em;
  opacity: 0.7;
}

@keyframes fadeUp {
  0% { transform: translateY(10px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); text-shadow: 0 0 15px #ffd700; }
  50% { transform: scale(1.15); text-shadow: 0 0 30px #ffea8a; }
}

@media (max-width: 768px) {
  .header-logo { width: 280px; }
  .logo-estevents { width: 80px; bottom: 10px; right: 10px; }
  .cell { font-size: 1.4em; }
  .scoreboard { padding: 20px; width: 85%; }
}
</style>
</head>
<body>

<header>
  <img src="logo_sportart.png.jpg" alt="Sport Art Cup 2026" class="header-logo">
</header>

<img src="logo_estevents.png.png" alt="EstEvents Logo" class="logo-estevents">

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div id="content" class="cell-container">
    <div class="cell">Очікування даних...</div>
  </div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8bIfxUFNLKBZZ9OQn9r-Dqt7jsaJULJJ-yNHhIT8U7AFGkWf8aiNrbG7cVbxEw6Oc0w/exec";
let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");
  const content = document.getElementById("content");

  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    if (!res.ok) return;

    const data = await res.json();
    if (!Array.isArray(data)) return;

    const fixedRow = Array.from({ length: 7 }, (_, i) => {
      return data[i] !== undefined && String(data[i]).trim() !== "" ? String(data[i]).trim() : "—";
    });

    const newData = JSON.stringify(fixedRow);
    if (newData === lastData) return;
    lastData = newData;

    scoreboard.classList.add("updating");

    setTimeout(() => {
      content.innerHTML = fixedRow.map((v, i) => 
        `<div class="cell" style="animation-delay: ${i * 0.05}s">${v}</div>`
      ).join('');
      scoreboard.classList.remove("updating");
    }, 300);

  } catch (e) { console.error("Помилка завантаження", e); }
}

loadData();
setInterval(loadData, 2500);
</script>

</body>
</html>
