<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Результати змагань — SportArt</title>
<style>
/* ОСНОВНІ СТИЛІ */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  /* Колір фону взято безпосередньо з вашого логотипу SportArt */
  background-color: #5c2084; 
  color: #ffffff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

/* ЛОГОТИПИ */
.logo-sportart {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 160px;
  height: auto;
  z-index: 1000;
}

.logo-estevents {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 110px;
  height: auto;
  z-index: 1000;
}

header {
  font-size: 2.2em;
  font-weight: 600;
  margin-bottom: 30px;
  text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
  animation: fadeIn 1.5s ease-in-out;
}

/* ТАБЛО (Колір EstEvents для контрасту) */
.scoreboard {
  /* Темно-синій фон як у логотипу EstEvents з легкою прозорістю */
  background: rgba(13, 51, 74, 0.9); 
  border: 2px solid #ffffff;
  border-radius: 25px;
  padding: 40px 60px;
  box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
  min-width: 60%;
  transition: filter 0.5s ease-in-out, transform 0.5s ease-in-out;
}

.updating {
  filter: blur(5px);
  transform: scale(0.98);
}

.cell-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.cell {
  font-size: 2em;
  color: #ffffff;
  font-weight: 700;
  animation: fadeUp 0.6s ease-out forwards;
}

.decor {
  font-size: 2.5em;
  color: #ffd700;
  margin-bottom: 15px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 40px;
  font-size: 0.9em;
  opacity: 0.9;
}

/* АНІМАЦІЇ */
@keyframes fadeUp {
  0% { transform: translateY(10px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Адаптація для телефонів */
@media (max-width: 768px) {
  .logo-sportart { width: 100px; top: 15px; left: 15px; }
  .logo-estevents { width: 80px; bottom: 15px; right: 15px; }
  header { font-size: 1.5em; }
  .cell { font-size: 1.3em; }
  .scoreboard { padding: 25px; width: 80%; }
}
</style>
</head>
<body>

<img src="logo_sportart.png.jpg" alt="Sportart Logo" class="logo-sportart">
<img src="logo_estevents.png.png" alt="EstEvents Logo" class="logo-estevents">

<header>Результати змагань</header>

<div class="scoreboard" id="scoreboard">
  <div class="decor">✨</div>
  <div id="content" class="cell-container">
    <div class="cell">Завантаження...</div>
  </div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8bIfxUFNLKBZZ9OQn9r-Dqt7jsaJULJJ-yNHhIT8U7AFGkWf8aiNrbG7cVbxEw6Oc0w/exec";
let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");
  const content = document.getElementById("content");

  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    if (!res.ok) return;

    const data = await res.json();
    if (!Array.isArray(data)) return;

    const fixedRow = Array.from({ length: 7 }, (_, i) => {
      return data[i] !== undefined && String(data[i]).trim() !== "" ? String(data[i]).trim() : "—";
    });

    const newData = JSON.stringify(fixedRow);
    if (newData === lastData) return;
    lastData = newData;

    scoreboard.classList.add("updating");

    setTimeout(() => {
      content.innerHTML = fixedRow.map((v, i) => 
        `<div class="cell" style="animation-delay: ${i * 0.05}s">${v}</div>`
      ).join('');
      scoreboard.classList.remove("updating");
    }, 300);

  } catch (e) { console.error("Помилка", e); }
}

loadData();
setInterval(loadData, 2500);
</script>

</body>
</html>
