<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Оцінки спортсменів — Художня гімнастика</title>
<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: radial-gradient(circle at top, #1a082b 0%, #0c0215 100%);
  color: #e3cfff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

header {
  color: #fff;
  font-size: 2em;
  font-weight: 600;
  margin-bottom: 40px;
  text-shadow: 0 0 15px #c299ff;
  animation: fadeIn 1.5s ease-in-out;
}

.scoreboard {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid rgba(200, 150, 255, 0.4);
  border-radius: 15px;
  padding: 30px 50px;
  box-shadow: 0 0 30px rgba(160, 80, 255, 0.3);
  backdrop-filter: blur(10px);
  min-width: 60%;
  transition: opacity 0.4s ease-in-out;
  position: relative;
}

/* Гімнастка (анімація під час оновлення) */
.spinner {
  width: 120px;
  height: 120px;
  margin: 30px auto;
  background-image: url('https://i.imgur.com/XavZj7E.png');
  background-size: contain;
  background-repeat: no-repeat;
  animation: spinGymnast 2s linear infinite;
}

@keyframes spinGymnast {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.cell {
  font-size: 1.6em;
  color: #bb8fff;
  margin: 10px 0;
  font-weight: 600;
  opacity: 0;
  animation: fadeUp 0.8s ease-in-out forwards;
}

.decor {
  font-size: 2.2em;
  color: #ffd700;
  margin-bottom: 15px;
  animation: pulseStar 2s infinite ease-in-out;
}

footer {
  margin-top: 40px;
  color: #bdaaff;
  font-size: 0.9em;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeUp {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes pulseStar {
  0%, 100% { transform: scale(1); text-shadow: 0 0 10px #ffd700; }
  50% { transform: scale(1.2); text-shadow: 0 0 25px #ffea8a; }
}

.error { color: #ff8ba7; font-size: 1.2em; margin-top: 20px; }

.scoreChanged { animation: pulse 1s ease-in-out; }

@keyframes pulse {
  0% { transform: scale(1); color: #bb8fff; text-shadow: 0 0 5px #bb8fff; }
  50% { transform: scale(1.3); color: #ff6fff; text-shadow: 0 0 20px #ff6fff; }
  100% { transform: scale(1); color: #bb8fff; text-shadow: 0 0 10px #bb8fff; }
}
</style>
</head>
<body>
<header>Офіційні результати змагань з художньої гімнастики</header>

<div class="scoreboard" id="scoreboard">
  <div class="decor">👑</div>
  <div class="cell">Завантаження...</div>
</div>

<footer>© 2025 EstEvents by Емма Щелецька</footer>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRz-4FumJ2c76o-bbGnbWWg_gw9nqxbEYMjdIaJi6Y5uMELcOfmiByk08qBfS8-MPt4vV3pBlJ_TuZT/pub?gid=1614929973&single=true&output=csv";

let lastData = "";

async function loadData() {
  const scoreboard = document.getElementById("scoreboard");

  try {
    // Додано cache: "no-cache" та заголовки для примусового оновлення
    const res = await fetch(SHEET_URL + "&cachebuster=" + Date.now(), {
      method: 'GET',
      cache: 'no-store',
      headers: {
        'Cache-Control': 'no-cache',
        'Pragma': 'no-cache'
      }
    });

    const text = await res.text();

    const rows = parseCSV(text);

    // 👉 7-й рядок
    const row = rows[6];

    if (!row) throw new Error("Немає 7-го рядка");

    const fixedRow = Array.from({ length: 7 }, (_, i) => row[i] ?? "—");

    const newData = JSON.stringify(fixedRow);

    if (newData === lastData) return;

    lastData = newData;

    let html = `<div class="decor">👑</div>`;

    fixedRow.forEach(cell => {
      html += `<div class="cell">${cell}</div>`;
    });

    scoreboard.style.opacity = 0;

    setTimeout(() => {
      scoreboard.innerHTML = html;
      scoreboard.style.opacity = 1;
    }, 120);

  } catch (err) {
    document.getElementById("scoreboard").innerHTML = `
      <div class="decor">👑</div>
      <div class="cell">Помилка 😢<br>${err.message}</div>
    `;
  }
}

// 🔥 правильний CSV parser
function parseCSV(text) {
  const rows = [];
  let row = [];
  let value = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      row.push(value.trim());
      value = "";
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (value || row.length) {
        row.push(value.trim());
        rows.push(row);
        row = [];
        value = "";
      }
    } else {
      value += char;
    }
  }

  if (value || row.length) {
    row.push(value.trim());
    rows.push(row);
  }

  return rows;
}

loadData();
setInterval(loadData, 3000);
</script>
</body>
</html>
